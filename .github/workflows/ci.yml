name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # SDD.md §7.2 / §8: lint, unit+integration tests (with the 80% coverage
  # gate vitest.config.ts already enforces), full build, and the full
  # Playwright E2E suite against a local wrangler dev + local D1/R2 — no
  # cloud credentials needed, mirrors exactly what M4-M8 already do locally.
  build-and-test:
    runs-on: ubuntu-latest
    # Safety net: without this, a hung step (see the playwright-install note
    # below — hit for real on this workflow's second-ever run) burns the
    # default 360-minute job timeout in silence instead of failing fast.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run format:check
      - run: npm run build

      # Enforces vitest.config.ts's 80% coverage thresholds (lines/functions/
      # branches/statements) as part of the same run — a threshold miss fails
      # this step, which blocks both deploy jobs below via `needs`.
      - run: npm run test:coverage

      - run: npm run migrate:local
      - run: npm run seed:local

      # e2e/*.spec.ts hit real outbound endpoints (Turnstile siteverify) using
      # Cloudflare's published test keys and swallow Resend failures by
      # design (workers/lib/email.ts) — this placeholder file is exactly what
      # every local E2E run has used since M7.
      - run: cp .dev.vars.example .dev.vars

      # [AMENDED] 2026-07-23 (M9 follow-up) — this step hung indefinitely on
      # this workflow's second-ever run (14+ minutes with no progress,
      # confirmed via the Actions API, on a run that otherwise finishes every
      # other step in under a minute). Root cause: `--with-deps` runs
      # `apt-get install` on the runner, and Ubuntu's `needrestart` service
      # can pop an interactive "restart services?" prompt during package
      # installs that blocks forever with no TTY to answer it in CI.
      # `NEEDRESTART_MODE=a` forces it to restart automatically instead of
      # prompting; `DEBIAN_FRONTEND=noninteractive` is the standard belt
      # for any other apt prompt. `timeout-minutes` is the backstop in case
      # something else hangs the same way in the future.
      - run: npx playwright install --with-deps chromium
        timeout-minutes: 5
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a

      # playwright.config.ts deliberately has no webServer block (astro
      # dev/wrangler dev auto-daemonize in a way incompatible with
      # Playwright's spawn-and-wait feature — see that file's own comment).
      # Start it ourselves, wait for it to answer, then run tests, then stop it.
      # (dist/ already exists from the `npm run build` step above — no need
      # to rebuild it again here.)
      - name: Start wrangler dev
        run: |
          nohup npx wrangler dev > wrangler-dev.log 2>&1 &
          echo $! > wrangler-dev.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8787/api/settings > /dev/null; then
              echo "wrangler dev is up"
              exit 0
            fi
            sleep 1
          done
          echo "wrangler dev did not become ready in time"
          cat wrangler-dev.log
          exit 1

      - run: npm run test:e2e

      - name: Stop wrangler dev
        if: always()
        run: kill $(cat wrangler-dev.pid) 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # SDD.md §7.1 step 2: every PR gets a real, clickable preview deployment
  # before anything is approved. No PUBLIC_TURNSTILE_SITE_KEY is set here on
  # purpose — src/lib/turnstile.ts falls back to Cloudflare's published
  # always-pass dummy sitekey, which sidesteps needing to register every
  # ephemeral preview URL as an allowed Turnstile hostname (Turnstile has no
  # wildcard hostname support).
  preview-deploy:
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: preview
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      # Idempotent (Wrangler tracks applied migrations) — safe on every PR push.
      - run: npx wrangler d1 migrations apply scattered-oaks-db-preview --remote --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # seeds/sample-data.sql is INSERT OR REPLACE, so re-seeding on every PR
      # is safe and intentional (Development-Plan.md M2: "seed data needs to
      # be safely re-runnable ... for preview-env reseeding on every PR").
      # Includes the dev-only Root fixture (root-dev/DevRoot!2026) — correct
      # here, this is preview/fixture data, never production.
      - run: npx wrangler d1 execute scattered-oaks-db-preview --remote --env preview --file=./seeds/sample-data.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: npx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # SDD.md §7.1 steps 3-5: production deploy, gated by the GitHub
  # "production" Environment's required reviewer — this job pauses here
  # until approved in the Actions UI, which is the actual approval gate
  # Requirements.md §11.1 requires. Runs only on push to main (i.e. after a
  # PR merges), never on the PR itself.
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    # Only counts actual execution time, not time spent waiting on the
    # required-reviewer approval click — safe to set even though this job
    # can sit "pending" for as long as the approval takes.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}

      - run: npx wrangler d1 migrations apply scattered-oaks-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Automates Manual-Setup-Guide.md's old item 15: GitHub holds the
      # source-of-truth value (SDD.md §9.1), CI pushes it into the Worker on
      # every deploy so the two can never drift. `wrangler secret put`
      # overwrites unconditionally, so this is safe to run every time.
      - name: Push Worker secrets
        run: |
          echo "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
          echo "$TURNSTILE_SECRET_KEY" | npx wrangler secret put TURNSTILE_SECRET_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      # One-time production Root bootstrap (Requirements.md §7.2.4, SDD.md
      # §10.2 item 19) — idempotent (INSERT OR IGNORE keyed on a fixed id),
      # so this is a safe no-op on every deploy after the first, including
      # after M11 rotates ROOT_ADMIN_BOOTSTRAP_PASSWORD to a throwaway value.
      - name: Seed production Root admin
        run: node --experimental-strip-types scripts/seed-root-admin.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ROOT_ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ROOT_ADMIN_BOOTSTRAP_PASSWORD }}

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
