name: D1 Backup

# SDD.md §8.6: D1 already has Cloudflare's built-in point-in-time recovery,
# but that's an in-place restore mechanism, not a portable export. This job
# produces an actual downloadable SQL dump on a regular schedule, stored in
# the dedicated scattered-oaks-backups bucket (deliberately NOT the
# scattered-oaks-media bucket, since workers/routes/media.ts serves any key
# under that bucket publicly and unauthenticated — a DB dump contains
# password hashes and session tokens and must never be reachable there).
on:
  schedule:
    - cron: '0 6 * * 0' # Sundays 06:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Export production D1 to SQL
        run: npx wrangler d1 export scattered-oaks-db --remote --output=backup.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload export to the backups bucket
        run: |
          npx wrangler r2 object put \
            "scattered-oaks-backups/d1/scattered-oaks-db-$(date -u +%Y-%m-%dT%H%M%SZ).sql" \
            --file=backup.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
