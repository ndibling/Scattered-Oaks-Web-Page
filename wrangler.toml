name = "scattered-oaks-farms"
main = "workers/index.ts"
compatibility_date = "2026-07-21"
account_id = "78698cbd5aa89fdf32f89b0fd6e83db3"

# Serves the Astro static build (npm run build -> dist/). Requests not matched by
# a static asset fall through to the Worker's fetch handler in workers/index.ts
# (SDD.md §2.1's 2026-07-21 amendment: one Worker project, not separate Pages + Workers).
[assets]
directory = "./dist"

# Production (default/top-level environment — no --env flag, matches `npx wrangler deploy`).
[[d1_databases]]
binding = "DB"
database_name = "scattered-oaks-db"
database_id = "347610ff-6871-4195-b102-9f071dcbddb0"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "scattered-oaks-media"

# Preview environment (`wrangler deploy --env preview` / Workers Builds per-PR previews).
# Same binding names as production so application code (workers/index.ts, Astro API
# helpers) never branches on environment — only the underlying resource differs.
[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "scattered-oaks-db-preview"
database_id = "713e4729-4c61-463b-b81f-1fb66b728542"

[[env.preview.r2_buckets]]
binding = "MEDIA"
bucket_name = "scattered-oaks-media-preview"
